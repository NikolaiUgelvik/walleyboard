name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

concurrency:
  group: publish-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish walleyboard
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Use npm 11.9.0 for trusted publishing
        run: |
          set -euo pipefail
          npm install --global npm@11.9.0
          npm --version

      - name: Install dependencies
        run: npm ci

      - name: Validate release tag
        id: validate-release
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if [[ ! "$TAG_NAME" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "Release tags must use the stable vX.Y.Z format. Got: $TAG_NAME" >&2
            exit 1
          fi

          RELEASE_VERSION="${TAG_NAME#v}"

          git fetch origin main --force

          TAG_COMMIT="$(git rev-list -n 1 "$TAG_NAME")"
          MAIN_COMMIT="$(git rev-parse origin/main)"

          if [[ "$TAG_COMMIT" != "$MAIN_COMMIT" ]]; then
            echo "Release tag $TAG_NAME must point to the current origin/main HEAD." >&2
            echo "tag:  $TAG_COMMIT" >&2
            echo "main: $MAIN_COMMIT" >&2
            exit 1
          fi

          echo "release_version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Validate workspace
        run: |
          set -euo pipefail
          npm run lint
          npm run typecheck
          npm run test
          npm run build:cli

      - name: Sync CLI version to release tag
        run: npm version "${{ steps.validate-release.outputs.release_version }}" --workspace walleyboard --no-git-tag-version

      - name: Publish to npm with OIDC
        run: npm publish --workspace walleyboard --access public

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${{ github.ref_name }}" --title "${{ github.ref_name }}" --generate-notes
